# Local development only (postgres + hot-reload API).
# For full staging stack (nginx + frontend + API), use the root docker-compose.yml:
#   cd .. && cp .env.staging.example .env && make staging-up

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ingobyi
      POSTGRES_PASSWORD: ingobyi_pass
      POSTGRES_DB: ingobyi_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ingobyi -d ingobyi_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  app:
    build: .
    env_file: .env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  postgres_data:
