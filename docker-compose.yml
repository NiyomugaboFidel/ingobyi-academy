# Ingobyi Academy — full stack (postgres + API + frontend + nginx)
#
# Quick start:
#   ./scripts/docker-init.sh    # creates .env with secrets
#   docker compose up -d --build
#   docker compose --profile seed run --rm seed   # first time: demo data
#
# App: http://localhost  (or PUBLIC_URL from .env)

name: ingobyi-academy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ingobyi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ingobyi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ingobyi} -d ${POSTGRES_DB:-ingobyi_db}']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ingobyi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ingobyi_db}
      NODE_ENV: ${NODE_ENV:-staging}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost}
      PORT: 3001
      RUN_SEED: ${RUN_SEED:-false}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}/api
        NEXT_PUBLIC_WS_URL: ${PUBLIC_URL:-http://localhost}
        NEXT_PUBLIC_SHOW_DEMO_CREDENTIALS: ${SHOW_DEMO_CREDENTIALS:-true}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  # One-time demo data: docker compose --profile seed run --rm seed
  seed:
    profiles: [seed]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ingobyi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ingobyi_db}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c', 'npx prisma migrate deploy && npx prisma db seed']
    restart: 'no'

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
